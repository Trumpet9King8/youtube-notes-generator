<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Benign Liberty – YouTube Notes Generator</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>🎬 Benign Liberty <span class="light">| YouTube → Notes</span></h1>
      <p class="tagline">Turn any lecture or tutorial into structured notes – instantly.</p>
    </header>

    <main>
      <div class="input-group">
        <input type="text" id="urlInput" placeholder="Paste YouTube URL here (e.g., https://www.youtube.com/watch?v=...)" />
        <button id="generateBtn">Generate Notes</button>
      </div>

      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>Fetching transcript and generating notes... (30-60 seconds)</p>
      </div>

      <div id="result" class="result-card"></div>
    </main>

    <footer>
      <p>Powered by OpenRouter (free Llama 3) • No API key required from you</p>
      <p class="small">Benign Liberty – quiet electric confidence</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
